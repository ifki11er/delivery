version: '3.8'

services:
  # 1. Reverse Proxy (Nginx) - 로컬 테스트용
  # 프로덕션에서는 SSL 설정을 추가하거나 Traefik 등으로 교체 가능
  nginx:
    image: nginx:alpine
    container_name: delivery_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web_ui
    networks:
      - delivery_network

  # 2. Web UI (Next.js)
  web_ui:
    build:
      context: ./web_ui
      dockerfile: Dockerfile
    container_name: delivery_web
    restart: unless-stopped
    # Nginx가 프록시해주므로 로컬 머신(호스트) 포트 3000번 매핑은 생략 가능하나, 
    # 디버깅 편의를 위해 열어둘 수 있습니다. (프로덕션에서는 막는 것이 좋음)
    ports:
      - "3000:3000"
    env_file:
      - ./web_ui/.env.local # 환경변수 파일. 상황에 따라 .env로 변경
    depends_on:
      - db
    networks:
      - delivery_network

  # 3. Backend Server (Node.js) - 추후 스크래핑 등 다양한 백엔드 작업 수행
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: delivery_backend
    restart: unless-stopped
    env_file:
      - ./web_ui/.env.local # DB URL 등 동일한 환경변수 공유 가능
    depends_on:
      - db
    networks:
      - delivery_network

  # 4. Database (PostgreSQL)
  db:
    image: postgres:15-alpine
    container_name: delivery_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-delivery}
    ports:
      # 로컬에서 DBeaver/PgAdmin 등으로 접속하기 위해 5432 포트 매핑
      - "5432:5432"
    volumes:
      - delivery_pgdata:/var/lib/postgresql/data
    networks:
      - delivery_network

networks:
  delivery_network:
    driver: bridge

volumes:
  delivery_pgdata:
